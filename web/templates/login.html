<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .title }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-blue-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
        <div class="text-center mb-8">
            <div class="inline-block p-3 bg-blue-100 rounded-full mb-4">
                <svg class="w-12 h-12 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path>
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-gray-800">Sistem Absensi</h1>
            <p class="text-gray-600 mt-2">Silakan login untuk melanjutkan</p>
        </div>

        <!-- Tab Switcher -->
        <div class="flex mb-6 bg-gray-100 rounded-lg p-1">
            <button onclick="switchLoginTab('password')" id="tab-password" class="flex-1 py-2 px-4 rounded-md font-semibold transition bg-white text-blue-600 shadow-sm">
                <div class="flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                    </svg>
                    <span>Password</span>
                </div>
            </button>
            <button onclick="switchLoginTab('face')" id="tab-face" class="flex-1 py-2 px-4 rounded-md font-semibold transition text-gray-600 hover:text-gray-800">
                <div class="flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <span>Wajah</span>
                </div>
            </button>
        </div>
        
        <div id="error-message" class="hidden bg-red-50 border-l-4 border-red-500 text-red-700 px-4 py-3 rounded mb-4 animate-shake">
            <div class="flex items-center">
                <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"></path>
                </svg>
                <span id="error-text"></span>
            </div>
        </div>

        <!-- Password Login Form -->
        <form id="login-form" class="space-y-6">
            <div>
                <label class="block text-gray-700 text-sm font-semibold mb-2" for="username">
                    Username
                </label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="h-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                        </svg>
                    </div>
                    <input 
                        class="w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition" 
                        id="username" 
                        type="text" 
                        placeholder="Masukkan username"
                        required
                        autocomplete="username"
                    >
                </div>
            </div>
            
            <div>
                <label class="block text-gray-700 text-sm font-semibold mb-2" for="password">
                    Password
                </label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                        </svg>
                    </div>
                    <input 
                        class="w-full pl-10 pr-10 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition" 
                        id="password" 
                        type="password" 
                        placeholder="Masukkan password"
                        required
                        autocomplete="current-password"
                    >
                    <button 
                        type="button" 
                        onclick="togglePasswordVisibility('password', 'password-eye')" 
                        class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600 transition"
                        title="Tampilkan/Sembunyikan password"
                    >
                        <svg id="password-eye" class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                        </svg>
                    </button>
                </div>
            </div>
            
            <button 
                id="login-btn"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition duration-200 flex items-center justify-center" 
                type="submit"
            >
                <span id="btn-text">Login</span>
                <svg id="btn-spinner" class="hidden animate-spin ml-2 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </button>
        </form>

        <!-- Face Login -->
        <div id="face-login" class="hidden space-y-6">
            <div class="text-center py-8">
                <div class="inline-block p-4 bg-blue-100 rounded-full mb-4">
                    <svg class="w-16 h-16 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                </div>
                <h3 class="text-xl font-bold text-gray-800 mb-2">Login dengan Face Recognition</h3>
                <p class="text-gray-600 text-sm mb-6">Klik tombol di bawah untuk membuka kamera dan login dengan wajah Anda</p>
                
                <button 
                    id="face-login-btn"
                    onclick="startFaceLogin()"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-lg transition duration-200 flex items-center justify-center gap-2"
                >
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    </svg>
                    <span>Buka Kamera</span>
                </button>

                <div class="mt-6 pt-6 border-t border-gray-200">
                    <p class="text-sm text-gray-600 mb-2">Atau gunakan metode lain:</p>
                    <button 
                        onclick="switchLoginTab('password')"
                        class="text-blue-600 hover:text-blue-700 font-semibold text-sm"
                    >
                        Login dengan Password →
                    </button>
                </div>
            </div>
        </div>
        
        <div class="mt-6 p-4 bg-blue-50 rounded-lg">
            <p class="text-sm text-gray-600 text-center font-medium mb-1">Demo Credentials:</p>
            <p class="text-sm text-gray-700 text-center"><span class="font-semibold">admin</span> / <span class="font-semibold">admin123</span></p>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('login-form');
        const loginBtn = document.getElementById('login-btn');
        const btnText = document.getElementById('btn-text');
        const btnSpinner = document.getElementById('btn-spinner');
        const errorDiv = document.getElementById('error-message');
        const errorText = document.getElementById('error-text');

        function showError(message) {
            errorText.textContent = message;
            errorDiv.classList.remove('hidden');
            setTimeout(() => {
                errorDiv.classList.add('hidden');
            }, 5000);
        }

        function setLoading(loading) {
            if (loading) {
                loginBtn.disabled = true;
                loginBtn.classList.add('opacity-75', 'cursor-not-allowed');
                btnText.textContent = 'Memproses...';
                btnSpinner.classList.remove('hidden');
            } else {
                loginBtn.disabled = false;
                loginBtn.classList.remove('opacity-75', 'cursor-not-allowed');
                btnText.textContent = 'Login';
                btnSpinner.classList.add('hidden');
            }
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            if (!username || !password) {
                showError('Username dan password harus diisi');
                return;
            }

            setLoading(true);
            errorDiv.classList.add('hidden');
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password }),
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    btnText.textContent = 'Berhasil!';
                    setTimeout(() => {
                        // Role-based redirect
                        if (data.user.role === 'admin') {
                            window.location.href = '/admin/dashboard';
                        } else {
                            window.location.href = '/dashboard';
                        }
                    }, 500);
                } else {
                    setLoading(false);
                    showError(data.error || 'Login gagal. Periksa username dan password Anda.');
                }
            } catch (error) {
                setLoading(false);
                showError('Terjadi kesalahan koneksi. Silakan coba lagi.');
                console.error('Login error:', error);
            }
        });

        // Auto-hide error on input
        document.getElementById('username').addEventListener('input', () => {
            errorDiv.classList.add('hidden');
        });
        document.getElementById('password').addEventListener('input', () => {
            errorDiv.classList.add('hidden');
        });

        // ========================================
        // PASSWORD VISIBILITY TOGGLE
        // ========================================
        
        function togglePasswordVisibility(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path>';
            } else {
                input.type = 'password';
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>';
            }
        }
        
        // Make function global
        window.togglePasswordVisibility = togglePasswordVisibility;

        // ========================================
        // TAB SWITCHER
        // ========================================
        
        function switchLoginTab(tab) {
            const passwordTab = document.getElementById('tab-password');
            const faceTab = document.getElementById('tab-face');
            const loginForm = document.getElementById('login-form');
            const faceLogin = document.getElementById('face-login');
            const errorDiv = document.getElementById('error-message');
            
            // Hide error
            errorDiv.classList.add('hidden');
            
            if (tab === 'password') {
                // Show password form
                passwordTab.classList.add('bg-white', 'text-blue-600', 'shadow-sm');
                passwordTab.classList.remove('text-gray-600');
                faceTab.classList.remove('bg-white', 'text-blue-600', 'shadow-sm');
                faceTab.classList.add('text-gray-600');
                
                loginForm.classList.remove('hidden');
                faceLogin.classList.add('hidden');
            } else {
                // Show face login
                faceTab.classList.add('bg-white', 'text-blue-600', 'shadow-sm');
                faceTab.classList.remove('text-gray-600');
                passwordTab.classList.remove('bg-white', 'text-blue-600', 'shadow-sm');
                passwordTab.classList.add('text-gray-600');
                
                loginForm.classList.add('hidden');
                faceLogin.classList.remove('hidden');
            }
        }

        // ========================================
        // FACE LOGIN
        // ========================================
        
        async function startFaceLogin() {
            const faceLoginBtn = document.getElementById('face-login-btn');
            const originalHTML = faceLoginBtn.innerHTML;
            
            // Disable button
            faceLoginBtn.disabled = true;
            faceLoginBtn.innerHTML = `
                <div class="inline-block animate-spin rounded-full h-5 w-5 border-b-2 border-white"></div>
                <span>Membuka kamera...</span>
            `;
            
            try {
                const modal = new CameraModal({
                    title: 'Login dengan Wajah',
                    captureButtonText: 'Login',
                    cancelButtonText: 'Batal',
                    tips: [
                        'Pastikan wajah terlihat jelas',
                        'Pencahayaan cukup',
                        'Hadap kamera langsung'
                    ],
                    onCapture: async (imageData) => {
                        // Show processing
                        faceLoginBtn.innerHTML = `
                            <div class="inline-block animate-spin rounded-full h-5 w-5 border-b-2 border-white"></div>
                            <span>Mengenali wajah...</span>
                        `;
                        
                        try {
                            // Call recognition API (public endpoint for login)
                            const response = await fetch('/api/face/recognize-login', {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json',
                                },
                                body: JSON.stringify({
                                    image_data: imageData,
                                    liveness_passed: true
                                })
                            });
                            
                            const data = await response.json();
                            
                            if (response.ok && data.matched) {
                                // Face recognized - get user data and login
                                showError(`Wajah dikenali: ${data.full_name}. Logging in...`);
                                errorDiv.classList.remove('bg-red-50', 'border-red-500', 'text-red-700');
                                errorDiv.classList.add('bg-green-50', 'border-green-500', 'text-green-700');
                                errorDiv.classList.remove('hidden');
                                
                                // Login with recognized user
                                await loginWithFaceRecognition(data.user_id, data.full_name);
                            } else {
                                // Face not recognized
                                showError(data.message || 'Wajah tidak dikenali. Silakan coba lagi atau gunakan password.');
                                faceLoginBtn.disabled = false;
                                faceLoginBtn.innerHTML = originalHTML;
                            }
                        } catch (error) {
                            console.error('Face recognition error:', error);
                            showError('Terjadi kesalahan saat mengenali wajah. Silakan coba lagi.');
                            faceLoginBtn.disabled = false;
                            faceLoginBtn.innerHTML = originalHTML;
                        }
                    },
                    onCancel: () => {
                        faceLoginBtn.disabled = false;
                        faceLoginBtn.innerHTML = originalHTML;
                    }
                });
                
                await modal.show();
                
                // Reset button after modal opens
                faceLoginBtn.disabled = false;
                faceLoginBtn.innerHTML = originalHTML;
                
            } catch (error) {
                console.error('Camera error:', error);
                showError('Gagal membuka kamera. Pastikan browser memiliki akses ke kamera.');
                faceLoginBtn.disabled = false;
                faceLoginBtn.innerHTML = originalHTML;
            }
        }

        async function loginWithFaceRecognition(userId, fullName) {
            try {
                // Get user credentials by user ID (admin endpoint)
                // Since we don't have direct login-by-id endpoint, we need to use a workaround
                // For now, we'll create a temporary token or use the recognition result
                
                // Alternative: Call a special endpoint that creates session from face recognition
                const response = await fetch('/api/auth/login-face', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        user_id: userId
                    })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    // Redirect based on role
                    setTimeout(() => {
                        if (data.user.role === 'admin') {
                            window.location.href = '/admin/dashboard';
                        } else {
                            window.location.href = '/dashboard';
                        }
                    }, 1000);
                } else {
                    // Fallback: If no special endpoint, show message to use password
                    showError(`Wajah dikenali sebagai ${fullName}, tetapi perlu login dengan password untuk keamanan.`);
                    switchLoginTab('password');
                }
            } catch (error) {
                console.error('Login error:', error);
                showError('Terjadi kesalahan saat login. Silakan gunakan password.');
                switchLoginTab('password');
            }
        }

        // Make functions global
        window.switchLoginTab = switchLoginTab;
        window.startFaceLogin = startFaceLogin;
    </script>

    <!-- Load Webcam Module -->
    <script src="/static/js/webcam.js"></script>
</body>
</html>
