<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .title }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }
        .toast-enter { animation: slideIn 0.3s ease-out; }
        .toast-exit { animation: slideOut 0.3s ease-in; }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-50 to-gray-100 min-h-screen">
    <!-- Toast Container -->
    <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>

    <!-- Navbar -->
    <nav class="bg-gradient-to-r from-blue-600 to-blue-700 text-white shadow-lg">
        <div class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-3">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
                    </svg>
                    <h1 class="text-xl font-bold">Sistem Absensi</h1>
                </div>
                <div class="flex items-center gap-4">
                    <div class="hidden sm:flex items-center space-x-2 bg-blue-500 bg-opacity-50 px-4 py-2 rounded-lg">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                        </svg>
                        <span id="user-name" class="font-medium"></span>
                    </div>
                    <a href="/history" class="bg-blue-500 hover:bg-blue-600 px-4 py-2 rounded-lg transition">
                        Riwayat
                    </a>
                    <a href="/profile" class="bg-blue-500 hover:bg-blue-600 px-4 py-2 rounded-lg transition flex items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                        </svg>
                        <span>Profil</span>
                    </a>
                    <button onclick="logout()" class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded-lg transition duration-200 flex items-center space-x-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                        </svg>
                        <span>Logout</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mx-auto mt-8 px-4 pb-8">
        <div class="max-w-3xl mx-auto">
            <!-- Welcome Card -->
            <div class="bg-white rounded-xl shadow-md p-6 mb-6">
                <div class="flex items-center justify-between">
                    <div>
                        <h2 class="text-2xl font-bold text-gray-800">Selamat Datang!</h2>
                        <p class="text-gray-600 mt-1" id="current-date"></p>
                    </div>
                </div>
            </div>

            <!-- Status Card -->
            <div class="bg-white rounded-xl shadow-md p-6 mb-6">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-xl font-bold text-gray-800">Status Absensi Hari Ini</h2>
                    <button onclick="loadTodayStatus()" class="text-blue-600 hover:text-blue-700 transition">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                        </svg>
                    </button>
                </div>
                <div id="today-status" class="text-center py-8">
                    <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
                    <p class="text-gray-500 mt-2">Memuat data...</p>
                </div>
            </div>

            <!-- Absensi Form Card -->
            <div class="bg-white rounded-xl shadow-md p-6 mb-6">
                <h2 class="text-xl font-bold text-gray-800 mb-4">Form Absensi</h2>
                
                <!-- Status Dropdown -->
                <div class="mb-4">
                    <label for="status" class="block text-sm font-semibold text-gray-700 mb-2">
                        Status Kehadiran
                    </label>
                    <div class="relative">
                        <select 
                            id="status" 
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition appearance-none bg-white"
                        >
                            <option value="hadir">Hadir</option>
                            <option value="izin">Izin</option>
                            <option value="sakit">Sakit</option>
                            <option value="cuti">Cuti</option>
                            <option value="alpha">Alpha</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-gray-500">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                            </svg>
                        </div>
                    </div>
                    <p class="text-xs text-gray-500 mt-1">Pilih status kehadiran Anda hari ini</p>
                </div>

                <!-- Keterangan Textarea -->
                <div class="mb-6">
                    <label for="keterangan" class="block text-sm font-semibold text-gray-700 mb-2">
                        Keterangan
                    </label>
                    <textarea 
                        id="keterangan" 
                        rows="4" 
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition resize-none"
                        placeholder="Masukkan keterangan atau alasan (opsional untuk Hadir, wajib untuk Izin/Sakit/Cuti/Alpha)..."
                    ></textarea>
                    <p class="text-xs text-gray-500 mt-1">Berikan penjelasan detail jika Anda izin, sakit, cuti, atau alpha</p>
                </div>

                <!-- Action Buttons -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
                    <button 
                        id="btn-masuk" 
                        onclick="clockIn()"
                        class="group bg-gradient-to-r from-green-500 to-green-600 hover:from-green-600 hover:to-green-700 text-white font-bold py-4 px-6 rounded-xl text-lg shadow-lg hover:shadow-xl transition duration-200 transform hover:-translate-y-1 disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none"
                    >
                        <div class="flex items-center justify-center space-x-3">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path>
                            </svg>
                            <span>Absen Masuk</span>
                        </div>
                    </button>
                    <button 
                        id="btn-pulang" 
                        onclick="clockOut()"
                        class="group bg-gradient-to-r from-orange-500 to-orange-600 hover:from-orange-600 hover:to-orange-700 text-white font-bold py-4 px-6 rounded-xl text-lg shadow-lg hover:shadow-xl transition duration-200 transform hover:-translate-y-1 disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none"
                    >
                        <div class="flex items-center justify-center space-x-3">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                            </svg>
                            <span>Absen Pulang</span>
                        </div>
                    </button>
                </div>

                <!-- Separator -->
                <div class="relative mb-6">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-300"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-4 bg-white text-gray-500 font-medium">ATAU</span>
                    </div>
                </div>

                <!-- Face Recognition Button -->
                <button 
                    id="btn-face-attendance" 
                    onclick="faceAttendance()"
                    class="w-full group bg-gradient-to-r from-purple-500 to-purple-600 hover:from-purple-600 hover:to-purple-700 text-white font-bold py-4 px-6 rounded-xl text-lg shadow-lg hover:shadow-xl transition duration-200 transform hover:-translate-y-1 disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none"
                >
                    <div class="flex items-center justify-center space-x-3">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        <span>Absen dengan Wajah</span>
                    </div>
                </button>
                <p class="text-xs text-gray-500 text-center mt-2">Gunakan face recognition untuk absen masuk secara otomatis</p>
            </div>

            <!-- Quick Link -->
            <div class="text-center">
                <a href="/history" class="inline-flex items-center space-x-2 text-blue-600 hover:text-blue-700 font-medium transition">
                    <span>Lihat Riwayat Absensi</span>
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                    </svg>
                </a>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');

        if (!token) {
            window.location.href = '/login';
        }

        document.getElementById('user-name').textContent = user.full_name || user.username;

        // Set current date
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('current-date').textContent = new Date().toLocaleDateString('id-ID', options);

        // Toast notification system
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            const bgColor = type === 'success' ? 'bg-green-500' : type === 'error' ? 'bg-red-500' : 'bg-blue-500';
            const icon = type === 'success' 
                ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>'
                : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>';
            
            toast.className = `${bgColor} text-white px-6 py-4 rounded-lg shadow-lg flex items-center space-x-3 toast-enter min-w-[300px]`;
            toast.innerHTML = `
                <svg class="w-6 h-6 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    ${icon}
                </svg>
                <span class="flex-1">${message}</span>
                <button onclick="this.parentElement.remove()" class="flex-shrink-0 hover:bg-white hover:bg-opacity-20 rounded p-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            `;
            
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.remove('toast-enter');
                toast.classList.add('toast-exit');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        async function fetchWithAuth(url, options = {}) {
            return fetch(url, {
                ...options,
                headers: {
                    ...options.headers,
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json',
                },
            });
        }

        async function loadTodayStatus() {
            try {
                const response = await fetchWithAuth('/api/absensi/today');
                const data = await response.json();
                
                const statusDiv = document.getElementById('today-status');
                
                if (data.data) {
                    const absensi = data.data;
                    const jamMasuk = absensi.jam_masuk || '-';
                    const jamPulang = absensi.jam_pulang || '-';
                    
                    statusDiv.innerHTML = `
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div class="bg-blue-50 rounded-lg p-4">
                                <div class="text-sm text-gray-600 mb-1">Tanggal</div>
                                <div class="text-lg font-bold text-gray-800">${absensi.tanggal}</div>
                            </div>
                            <div class="bg-green-50 rounded-lg p-4">
                                <div class="text-sm text-gray-600 mb-1">Jam Masuk</div>
                                <div class="text-lg font-bold ${jamMasuk === '-' ? 'text-gray-400' : 'text-green-600'}">${jamMasuk}</div>
                            </div>
                            <div class="bg-orange-50 rounded-lg p-4">
                                <div class="text-sm text-gray-600 mb-1">Jam Pulang</div>
                                <div class="text-lg font-bold ${jamPulang === '-' ? 'text-gray-400' : 'text-orange-600'}">${jamPulang}</div>
                            </div>
                        </div>
                        <div class="mt-4 inline-flex items-center px-4 py-2 bg-green-100 text-green-800 rounded-full">
                            <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path>
                            </svg>
                            <span class="font-semibold">${absensi.status.toUpperCase()}</span>
                        </div>
                    `;
                } else {
                    statusDiv.innerHTML = `
                        <div class="text-center py-4">
                            <svg class="w-16 h-16 mx-auto text-gray-300 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
                            </svg>
                            <p class="text-gray-500 text-lg">Belum absen hari ini</p>
                            <p class="text-gray-400 text-sm mt-1">Silakan klik tombol "Absen Masuk" untuk memulai</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error loading status:', error);
                showToast('Gagal memuat status absensi', 'error');
            }
        }

        async function clockIn() {
            const btn = document.getElementById('btn-masuk');
            const status = document.getElementById('status').value;
            const keterangan = document.getElementById('keterangan').value.trim();
            
            // Validation: keterangan wajib untuk non-hadir
            if (status !== 'hadir' && !keterangan) {
                showToast(`Keterangan wajib diisi untuk status "${status.toUpperCase()}"`, 'error');
                document.getElementById('keterangan').focus();
                return;
            }
            
            btn.disabled = true;
            btn.innerHTML = '<div class="flex items-center justify-center space-x-2"><div class="animate-spin rounded-full h-5 w-5 border-b-2 border-white"></div><span>Memproses...</span></div>';
            
            try {
                const response = await fetchWithAuth('/api/absensi/masuk', {
                    method: 'POST',
                    body: JSON.stringify({ 
                        status: status,
                        keterangan: keterangan || null
                    }),
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showToast(data.message, 'success');
                    await loadTodayStatus();
                    // Reset form
                    document.getElementById('status').value = 'hadir';
                    document.getElementById('keterangan').value = '';
                } else {
                    showToast(data.error, 'error');
                }
            } catch (error) {
                showToast('Terjadi kesalahan. Silakan coba lagi.', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<div class="flex items-center justify-center space-x-3"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path></svg><span>Absen Masuk</span></div>';
            }
        }

        async function clockOut() {
            const btn = document.getElementById('btn-pulang');
            const keterangan = document.getElementById('keterangan').value.trim();
            
            btn.disabled = true;
            btn.innerHTML = '<div class="flex items-center justify-center space-x-2"><div class="animate-spin rounded-full h-5 w-5 border-b-2 border-white"></div><span>Memproses...</span></div>';
            
            try {
                const response = await fetchWithAuth('/api/absensi/pulang', {
                    method: 'POST',
                    body: JSON.stringify({ 
                        keterangan: keterangan || null
                    }),
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showToast(data.message, 'success');
                    await loadTodayStatus();
                    // Reset form
                    document.getElementById('keterangan').value = '';
                } else {
                    showToast(data.error, 'error');
                }
            } catch (error) {
                showToast('Terjadi kesalahan. Silakan coba lagi.', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<div class="flex items-center justify-center space-x-3"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg><span>Absen Pulang</span></div>';
            }
        }

        function logout() {
            if (confirm('Apakah Anda yakin ingin logout?')) {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                window.location.href = '/login';
            }
        }

        // Load status on page load
        loadTodayStatus();

        // Dynamic status change handler
        document.getElementById('status').addEventListener('change', function() {
            const keteranganField = document.getElementById('keterangan');
            const keteranganLabel = keteranganField.previousElementSibling.previousElementSibling;
            const keteranganHint = keteranganField.nextElementSibling;
            
            if (this.value === 'hadir') {
                keteranganField.placeholder = 'Masukkan keterangan (opsional)...';
                keteranganHint.textContent = 'Keterangan bersifat opsional untuk status Hadir';
                keteranganField.classList.remove('border-red-300', 'ring-2', 'ring-red-200');
            } else {
                keteranganField.placeholder = `Masukkan alasan ${this.value} (wajib diisi)...`;
                keteranganHint.textContent = `Keterangan WAJIB diisi untuk status ${this.value.toUpperCase()}`;
                keteranganHint.classList.add('text-red-600', 'font-semibold');
                keteranganField.classList.add('border-red-300');
            }
        });

        // ========================================
        // FACE ATTENDANCE FUNCTIONALITY
        // ========================================
        
        async function faceAttendance() {
            const btn = document.getElementById('btn-face-attendance');
            const originalHTML = btn.innerHTML;
            
            // Disable button
            btn.disabled = true;
            btn.innerHTML = `
                <div class="flex items-center justify-center space-x-2">
                    <div class="animate-spin rounded-full h-5 w-5 border-b-2 border-white"></div>
                    <span>Membuka kamera...</span>
                </div>
            `;
            
            try {
                const modal = new CameraModal({
                    title: 'Absen dengan Wajah',
                    captureButtonText: 'Absen',
                    cancelButtonText: 'Batal',
                    tips: [
                        'Pastikan wajah terlihat jelas',
                        'Pencahayaan cukup',
                        'Hadap kamera langsung'
                    ],
                    onCapture: async (imageData) => {
                        // Show processing
                        btn.innerHTML = `
                            <div class="flex items-center justify-center space-x-2">
                                <div class="animate-spin rounded-full h-5 w-5 border-b-2 border-white"></div>
                                <span>Mengenali wajah...</span>
                            </div>
                        `;
                        
                        try {
                            // Call recognition API
                            const response = await fetchWithAuth('/api/face/recognize', {
                                method: 'POST',
                                body: JSON.stringify({
                                    image_data: imageData,
                                    liveness_passed: true
                                })
                            });
                            
                            const data = await response.json();
                            
                            if (response.ok && data.matched) {
                                // Face recognized - auto clock in
                                showToast(`Wajah dikenali: ${data.full_name}. Memproses absensi...`, 'success');
                                
                                // Show processing
                                btn.innerHTML = `
                                    <div class="flex items-center justify-center space-x-2">
                                        <div class="animate-spin rounded-full h-5 w-5 border-b-2 border-white"></div>
                                        <span>Memproses absensi...</span>
                                    </div>
                                `;
                                
                                // Auto clock in with status "hadir"
                                const clockInResponse = await fetchWithAuth('/api/absensi/masuk', {
                                    method: 'POST',
                                    body: JSON.stringify({ 
                                        status: 'hadir',
                                        keterangan: `Absen dengan face recognition (Confidence: ${(data.confidence * 100).toFixed(1)}%)`
                                    })
                                });
                                
                                const clockInData = await clockInResponse.json();
                                
                                if (clockInResponse.ok) {
                                    showToast(`${clockInData.message} - ${data.full_name}`, 'success');
                                    await loadTodayStatus();
                                    
                                    // Reset form
                                    document.getElementById('status').value = 'hadir';
                                    document.getElementById('keterangan').value = '';
                                } else {
                                    showToast(clockInData.error || 'Gagal melakukan absensi', 'error');
                                }
                            } else {
                                // Face not recognized
                                showToast(data.message || 'Wajah tidak dikenali. Silakan coba lagi atau gunakan absen manual.', 'error');
                            }
                        } catch (error) {
                            console.error('Face attendance error:', error);
                            showToast('Terjadi kesalahan saat memproses absensi. Silakan coba lagi.', 'error');
                        } finally {
                            // Reset button
                            btn.disabled = false;
                            btn.innerHTML = originalHTML;
                        }
                    },
                    onCancel: () => {
                        btn.disabled = false;
                        btn.innerHTML = originalHTML;
                    }
                });
                
                await modal.show();
                
                // Reset button after modal opens
                btn.disabled = false;
                btn.innerHTML = originalHTML;
                
            } catch (error) {
                console.error('Camera error:', error);
                showToast('Gagal membuka kamera. Pastikan browser memiliki akses ke kamera.', 'error');
                btn.disabled = false;
                btn.innerHTML = originalHTML;
            }
        }

        // Make function global
        window.faceAttendance = faceAttendance;
    </script>

    <!-- Load Webcam Module -->
    <script src="/static/js/webcam.js"></script>
</body>
</html>
